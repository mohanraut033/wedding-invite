<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mohan Weds Samiksha</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --pink-bg: #fdecef;
    --gold: #d4af37;
    --gold-dark: #b8962e;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--pink-bg);
}

/* HERO ANIMATION */
header {
    padding: 80px 20px;
    text-align: center;
    background: linear-gradient(rgba(253,236,239,0.6), rgba(253,236,239,0.6)), url('background.png');
    background-size: cover;
    animation: zoomBg 20s infinite alternate;
}

@keyframes zoomBg {
    from {background-size: 100%;}
    to {background-size: 110%;}
}

/* NAME GLOW */
.names h1 {
    font-family: 'Playfair Display';
    font-size: 42px;
    color: var(--gold-dark);
    text-shadow: 0 0 10px rgba(212,175,55,0.4);
}

.heart-text {
    font-size: 30px;
    color: var(--gold);
}

/* STORY */
.story-hero {
    margin-top: 30px;
    padding: 20px;
    background: rgba(255,255,255,0.5);
    border-radius: 15px;
}

/* CARDS */
.card {
    background: white;
    margin: 50px auto;
    padding: 35px;
    max-width: 800px;
    border-radius: 20px;
    border-top: 4px solid var(--gold);
    text-align: center;

    opacity: 0;
    transform: translateY(30px);
    transition: 0.6s;
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

h2 {
    font-family: 'Playfair Display';
    font-size: 28px;
    color: var(--gold-dark);
    margin-bottom: 15px;
}

/* EVENTS */
.event {
    margin-top: 30px;
}

.event img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

/* RSVP FORM */
input {
    padding: 10px;
    width: 80%;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 10px;
}

/* BUTTON */
button {
    margin: 15px 5px;
    padding: 12px 25px;
    background: var(--gold);
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

/* MOBILE */
@media (max-width:600px) {
    .names h1 {font-size: 32px;}
    h2 {font-size: 24px;}
    .card {margin: 30px 15px;}
}
</style>
</head>

<body>

<header>
    <div class="names">
        <h1>Mohan</h1>
        <div class="heart-text">❤️</div>
        <h1>Samiksha</h1>
        <p>With blessings of our families ❤️</p>

        <p style="margin-top:10px;font-style:italic;">
        We would be honored to celebrate this special day with you
        </p>

        <div class="story-hero">
            <h2>Our Story ❤️</h2>
            <p id="typingText"></p>
            <p id="marathiText" style="opacity:0;">“शुभ मंगल सावधान”</p>
        </div>
    </div>
</header>

<section class="card">
    <h2>Save the Date 💍</h2>
    <p><strong>7 May 2026</strong></p>
</section>

<section class="card">
    <h2>Countdown ⏳</h2>
    <div id="countdown"></div>
</section>

<section class="card">
    <h2>Wedding Events 🎉</h2>

    <div class="event">
        <h3>💍 Engagement</h3>
        <img src="https://images.unsplash.com/photo-1700765277969-554a3666eaac?q=80&w=1470">
    </div>

    <div class="event">
        <h3>🌼 Haldi</h3>
        <img src="https://plus.unsplash.com/premium_photo-1682092044797-8b893042b2d2?q=80&w=1470">
    </div>

    <div class="event">
        <h3>🍽️ Lunch</h3>
        <img src="https://images.unsplash.com/photo-1555244162-803834f70033?q=80&w=1470">
    </div>

    <div class="event">
        <h3>🔥 Wedding</h3>
        <img src="https://plus.unsplash.com/premium_photo-1682092632793-c7d75b23718e?q=80&w=1470">
    </div>
</section>

<section class="card">
    <h2>Venue 📍</h2>
    <iframe 
        src="https://www.google.com/maps?q=Hotel+Amrai+69&output=embed"
        width="100%" height="250"
        style="border-radius:15px;border:0;">
    </iframe>
</section>

<section class="card">
    <h2>RSVP 💌</h2>

    <input type="text" id="name" placeholder="Enter your name">

    <div>
        <button onclick="sendRSVP('Yes')">Will Attend</button>
        <button onclick="sendRSVP('No')">Not Attend</button>
    </div>
</section>

<script>
// typing
const text="Sometimes, the most beautiful journeys begin with a simple introduction. What started as an arranged meeting turned into a bond filled with understanding, respect, and growing affection.";
let i=0;
(function type(){
    if(i<text.length){
        document.getElementById("typingText").innerHTML+=text[i++];
        setTimeout(type,25);
    } else {
        document.getElementById("marathiText").style.opacity=1;
    }
})();

// countdown
const target=new Date("May 7, 2026 18:59:00").getTime();
setInterval(()=>{
    let now=new Date().getTime();
    let d=target-now;
    document.getElementById("countdown").innerHTML=
    Math.floor(d/(1000*60*60*24))+" Days "+
    Math.floor((d%(1000*60*60*24))/(1000*60*60))+" H "+
    Math.floor((d%(1000*60*60))/(1000*60))+" M";
},1000);

// RSVP
function sendRSVP(status){
    const name=document.getElementById("name").value || "Guest";
    window.location.href=`https://wa.me/9767933883?text=${name} will ${status}`;
}

// scroll animation
const observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting) e.target.classList.add("show");
    });
});
document.querySelectorAll('.card').forEach(el=>observer.observe(el));
</script>

</body>
</html>
